<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <link rel="stylesheet" href="styles.css">
    <!--TODO: Documentar lodash-->
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <script src="script.js"> 
    
    </script>
</head>
<body>
    
    <div id ="title">
        <h1>Blackjack</h1>
        <div id="winner"></div>
        
    </div>
    
    <div class="table" id="dealerT">
        <div class="text">
            <p>Dealer: <span id="dealersPoints">0</span></p>
        </div>
        <div id="cd" class="cardT">

            <img id="dealerCard1" src="images/cartas/red_back.png" class="carta">
            <img id="dealerCard2" src="images/cartas/red_back.png" class="carta">

        </div>
        
        
    </div>


    <div class="table" id="playerT">
        <div class="text">
            <p>Player: <span id="playerPoints">0</span></p>

        </div>

        <div id="cp" class="cardT">

        </div>

        <div class="buttons">
            <button onclick="pull('cp', 'playerPoints')" class="botones" id="hitButton">hit</button>
            <button onclick="stand()" class="botones" id="standButton">stand</button>

        </div>

    </div>



</body>
</html>
